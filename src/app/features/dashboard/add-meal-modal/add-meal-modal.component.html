<div class="modal-sheet" #sheet>
  <div class="modal-handle" aria-hidden="true"></div>
  <h2 id="modal-title" class="modal-title">Mahlzeit hinzufügen</h2>

  <div class="card-title">Favoriten</div>
  <div class="quick-picks" role="list">
    @for (meal of favoriteMeals(); track meal.name) {
      <div class="quick-pick-wrap" role="listitem">
        <button type="button" class="quick-pick-fill" (click)="fillQuick(meal)">
          {{ meal.name }} · {{ meal.kcal === null ? '−' : meal.kcal + ' kcal' }}
        </button>
        <button
          type="button"
          class="quick-pick-remove"
          (click)="removeFavorite(meal.name)"
          [attr.aria-label]="meal.name + ' aus Favoriten entfernen'"
        >×</button>
      </div>
    } @empty {
      <p class="quick-picks-empty">Noch keine Favoriten gespeichert.</p>
    }
  </div>

  <div class="divider" aria-hidden="true"></div>

  <div class="form-group">
    <label for="meal-name">Bezeichnung</label>
    <input
      type="text"
      id="meal-name"
      [ngModel]="mealName()"
      (ngModelChange)="mealName.set($event)"
      placeholder="z.B. Haferflocken mit Früchten"
      autocomplete="off"
    >
  </div>

  <div class="form-row">
    <div class="form-group">
      <label for="meal-kcal">Kalorien (kcal, optional)</label>
      <input
        type="number"
        id="meal-kcal"
        [ngModel]="mealKcal()"
        (ngModelChange)="mealKcal.set($event)"
        placeholder="350"
        min="1"
      >
    </div>
    <div class="form-group">
      <label for="meal-type">Mahlzeit</label>
      <select id="meal-type" [ngModel]="mealType()" (ngModelChange)="mealType.set($event)">
        <option>🌅 Frühstück</option>
        <option>☀️ Mittagessen</option>
        <option>🌙 Abendessen</option>
        <option>🍎 Snack</option>
      </select>
    </div>
  </div>

  <button
    type="button"
    class="btn-favorite"
    [class.active]="saveAsFavorite()"
    [attr.aria-pressed]="saveAsFavorite()"
    (click)="toggleSaveAsFavorite()"
  >
    {{ saveAsFavorite() ? '★' : '☆' }} Als Favorit speichern
  </button>

  <button
    class="btn-primary"
    type="button"
    (click)="submit()"
    [attr.aria-disabled]="!mealName().trim()"
  >Hinzufügen</button>
</div>
